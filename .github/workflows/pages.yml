name: Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Grant the deploy job just what GitHub Pages needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deploy; don't cancel an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy landing page
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          # Create/enable the Pages site if it doesn't exist yet, so the first
          # deploy doesn't depend on Pages being enabled in Settings first.
          enablement: true
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
