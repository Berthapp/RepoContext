name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"

jobs:
  pack-tool:
    name: Pack global tool
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Allow GitHub to issue an OIDC token for NuGet Trusted Publishing
      # (keyless publish; the matching policy lives on nuget.org).
      id-token: write
    # Job-level so the steps' `if:` can see it (step-level env is not
    # visible to the same step's condition). NUGET_USER is the nuget.org
    # profile name that owns the trusted publishing policy.
    env:
      NUGET_USER: ${{ secrets.NUGET_USER }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      # The tag only triggers this workflow; the package version comes from
      # VersionPrefix. Fail fast when they disagree, otherwise the push would
      # silently --skip-duplicate an already-published version.
      - name: Verify tag matches VersionPrefix
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          version=$(grep -oPm1 '(?<=<VersionPrefix>)[^<]+' Directory.Build.props)
          tag="${GITHUB_REF_NAME#v}"
          if [ "$version" != "$tag" ]; then
            echo "::error::Tag v$tag does not match VersionPrefix $version in Directory.Build.props. Bump the version, then re-tag."
            exit 1
          fi
      - name: Pack
        # The tool package embeds the publish output; trim the ~24 unused
        # tree-sitter grammars there too (same switch as the self-contained
        # builds), or the package balloons to >80 MB.
        run: >
          dotnet pack src/RepoContext.Cli/RepoContext.Cli.csproj
          -c Release -p:TrimTreeSitterGrammars=true -o artifacts/nupkg
      - uses: actions/upload-artifact@v7
        with:
          name: repoctx-tool-nupkg
          path: artifacts/nupkg/*.nupkg
      # Publish to NuGet.org only for tag builds, and only when the NUGET_USER
      # secret is configured. Trusted Publishing: exchange the GitHub OIDC
      # token for a 1-hour API key against the policy registered on nuget.org
      # (repo Berthapp/RepoContext, workflow release.yml). No long-lived key.
      - name: NuGet login (OIDC -> temp API key)
        if: startsWith(github.ref, 'refs/tags/v') && env.NUGET_USER != ''
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}
      # --skip-duplicate makes re-runs idempotent.
      - name: Push to NuGet.org
        if: startsWith(github.ref, 'refs/tags/v') && env.NUGET_USER != ''
        run: >
          dotnet nuget push "artifacts/nupkg/*.nupkg"
          --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

  self-contained:
    name: Self-contained (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            os: ubuntu-latest
          - rid: win-x64
            os: windows-latest
          - rid: osx-arm64
            os: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Publish
        run: >
          dotnet publish src/RepoContext.Cli/RepoContext.Cli.csproj
          -c Release -r ${{ matrix.rid }} --self-contained true
          -p:TrimTreeSitterGrammars=true
          -o artifacts/${{ matrix.rid }}
      # Package each RID as a single downloadable archive for the release:
      # .zip for Windows, .tar.gz elsewhere.
      - name: Archive (tar.gz)
        if: runner.os != 'Windows'
        run: tar -czf repoctx-${{ matrix.rid }}.tar.gz -C artifacts/${{ matrix.rid }} .
      - name: Archive (zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path artifacts/${{ matrix.rid }}/* -DestinationPath repoctx-${{ matrix.rid }}.zip
      - uses: actions/upload-artifact@v7
        with:
          name: repoctx-${{ matrix.rid }}
          path: |
            repoctx-${{ matrix.rid }}.tar.gz
            repoctx-${{ matrix.rid }}.zip
          if-no-files-found: error

  github-release:
    name: GitHub Release
    needs: [pack-tool, self-contained]
    runs-on: ubuntu-latest
    # Only cut a release for pushed version tags.
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        # Draft so the release notes and attached binaries can be reviewed
        # before it is made public. Attaches the self-contained archives and
        # the NuGet package for direct download.
        run: >
          gh release create "${{ github.ref_name }}"
          dist/repoctx-*.tar.gz dist/repoctx-*.zip dist/*.nupkg
          --repo "${{ github.repository }}"
          --title "RepoContext ${{ github.ref_name }}"
          --draft
          --generate-notes
