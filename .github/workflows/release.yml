name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"

jobs:
  pack-tool:
    name: Pack global tool
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Pack
        run: dotnet pack src/RepoContext.Cli/RepoContext.Cli.csproj -c Release -o artifacts/nupkg
      - uses: actions/upload-artifact@v4
        with:
          name: repoctx-tool-nupkg
          path: artifacts/nupkg/*.nupkg

  self-contained:
    name: Self-contained (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            os: ubuntu-latest
          - rid: win-x64
            os: windows-latest
          - rid: osx-arm64
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Publish
        run: >
          dotnet publish src/RepoContext.Cli/RepoContext.Cli.csproj
          -c Release -r ${{ matrix.rid }} --self-contained true
          -p:TrimTreeSitterGrammars=true
          -o artifacts/${{ matrix.rid }}
      - uses: actions/upload-artifact@v4
        with:
          name: repoctx-${{ matrix.rid }}
          path: artifacts/${{ matrix.rid }}
